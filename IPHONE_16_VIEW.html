<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPhone 16 View - Support Group Finder</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .device-container {
            background: #000;
            border-radius: 50px;
            padding: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            width: 100%;
            max-width: 400px;
            aspect-ratio: 9 / 19.5;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: visible;
        }

        .device-frame {
            width: 100%;
            height: 100%;
            background: #F2F2F7;
            border-radius: 45px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.1);
        }

        /* iPhone 16 Dynamic Island */
        .dynamic-island {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 28px;
            background: #000;
            border-radius: 20px;
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            color: #fff;
            gap: 4px;
            pointer-events: none;
        }

        .dynamic-island::before {
            content: "📡";
            font-size: 12px;
        }

        .dynamic-island::after {
            content: "9:41";
            font-weight: 600;
        }

        /* Safe area insets */
        .safe-area-top {
            height: 50px;
            background: transparent;
            position: relative;
            z-index: 50;
            flex-shrink: 0;
        }

        .content {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
            width: 100%;
            margin: 0;
            padding: 0;
        }

        .iframe-container {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            flex: 1;
        }

        .safe-area-bottom {
            height: 30px;
            background: #F2F2F7;
            border-top: 1px solid rgba(0, 0, 0, 0.05);
            flex-shrink: 0;
        }

        .info-panel {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.9);
            color: #0D9488;
            padding: 15px 20px;
            border-radius: 12px;
            font-size: 12px;
            max-width: 250px;
            z-index: 1000;
            font-family: 'Monaco', monospace;
            border: 1px solid #0D9488;
        }

        .info-panel h4 {
            color: #0D9488;
            margin-bottom: 8px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-panel p {
            margin: 6px 0;
            font-size: 11px;
            line-height: 1.4;
            color: rgba(255, 255, 255, 0.8);
        }

        .info-panel code {
            display: block;
            background: rgba(13, 148, 136, 0.1);
            padding: 4px 8px;
            border-radius: 4px;
            margin-top: 4px;
            font-size: 10px;
            overflow-x: auto;
        }

        .status-badge {
            display: inline-block;
            background: #0D9488;
            color: white;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 10px;
            margin-top: 6px;
            font-weight: 600;
        }

        /* Dark mode toggle */
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #0D9488;
            color: #0D9488;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            z-index: 999;
            font-weight: 600;
        }

        .theme-toggle:hover {
            background: rgba(0, 0, 0, 0.9);
        }

        /* Scrollbar */
        .content::-webkit-scrollbar {
            width: 4px;
        }

        .content::-webkit-scrollbar-track {
            background: transparent;
        }

        .content::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
        }

        .content::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 0, 0, 0.3);
        }

        /* Dark mode */
        body.dark-mode {
            background: #0a0a0a;
        }

        body.dark-mode .device-frame {
            background: #000;
        }

        body.dark-mode .safe-area-top,
        body.dark-mode .safe-area-bottom {
            background: #000;
        }

        body.dark-mode .safe-area-bottom {
            border-top-color: rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()">🌙 Dark Mode</button>

    <div class="device-container">
        <div class="device-frame">
            <!-- iPhone 16 Dynamic Island -->
            <div class="dynamic-island"></div>

            <!-- Safe area top (notch area) -->
            <div class="safe-area-top"></div>

            <!-- App Content -->
            <div class="content">
                <iframe
                    src="http://localhost:3005"
                    class="iframe-container"
                    allow="accelerometer; ambient-light-sensor; autoplay; camera; geolocation; gyroscope; magnetometer; microphone; payment; usb; vr; xr-spatial-tracking"
                    sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-top-navigation"
                ></iframe>
            </div>

            <!-- Safe area bottom (home indicator) -->
            <div class="safe-area-bottom"></div>
        </div>
    </div>

    <!-- Info Panel -->
    <div class="info-panel">
        <h4>iPhone 16 Emulation</h4>
        <p><strong>Device:</strong> iPhone 16</p>
        <p><strong>Screen:</strong> 393 × 852px</p>
        <p><strong>Dynamic Island:</strong> Active</p>
        <p><strong>Safe Area:</strong> Enabled</p>
        <p><strong>Features:</strong></p>
        <code>• Haptic Feedback ✓
• Dark Mode ✓
• Notch Support ✓</code>
        <p style="margin-top: 12px; font-size: 10px; color: #0D9488;">
            Try: Search for "Anxiety" and feel the haptic feedback! 📱
        </p>
        <span class="status-badge">LIVE ON LOCALHOST:3005</span>
    </div>

    <script>
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const toggle = document.querySelector('.theme-toggle');
            const isDark = document.body.classList.contains('dark-mode');
            toggle.textContent = isDark ? '☀️ Light Mode' : '🌙 Dark Mode';
            localStorage.setItem('theme-preference', isDark ? 'dark' : 'light');

            // Notify iframe about theme change
            const iframe = document.querySelector('iframe');
            if (iframe.contentWindow) {
                iframe.contentWindow.postMessage(
                    { type: 'theme-change', isDark },
                    '*'
                );
            }
        }

        // Load saved theme preference
        function initTheme() {
            const saved = localStorage.getItem('theme-preference');
            if (saved === 'dark') {
                document.body.classList.add('dark-mode');
                document.querySelector('.theme-toggle').textContent = '☀️ Light Mode';
            }
        }

        // Initialize on load
        window.addEventListener('load', initTheme);

        // Handle iframe messages
        window.addEventListener('message', (event) => {
            if (event.data.type === 'haptic-feedback') {
                // Simulate haptic feedback with visual feedback
                const device = document.querySelector('.device-frame');
                device.style.animation = 'pulse 0.3s ease-out';
                setTimeout(() => {
                    device.style.animation = '';
                }, 300);
            }
        });
    </script>

    <style>
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(0.98); }
            100% { transform: scale(1); }
        }
    </style>
</body>
</html>
