<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />
    <meta name="description" content="Find local and online support groups near you. Connect with community resources for mental health, addiction, grief, and more." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Support Groups" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="format-detection" content="email=no" />
    <meta name="supported-color-schemes" content="light dark" />
    <!-- iOS 18+ Safe Area Support -->
    <meta name="viewport-fit" content="cover" />
    <!-- Apple Touch Icons for home screen -->
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
    <!-- Standard Icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512x512.png" />
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>Support Group Finder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      html, body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        position: fixed;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background-color: #F2F2F7;
        color: #1C1C1E;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        /* iOS 18+ Safe Area Support */
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
        /* Prevent zooming on iOS */
        -webkit-user-select: none;
        -webkit-touch-callout: none;
      }
      #root {
        width: 100%;
        height: 100%;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
      /* Hide scrollbar for clean UI but allow scrolling */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      /* iOS Glass Morphism Panel (iOS 18+ design) */
      .glass-panel {
        background: rgba(255, 255, 255, 0.80);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.30);
      }
      @supports (color: -webkit-system-color(label)) {
        .glass-panel {
          background: rgba(255, 255, 255, 0.75);
        }
      }
      /* iOS Button Interactions (haptic feedback with active state) */
      button, a {
        -webkit-user-select: none;
      }
      button:active, a:active {
        opacity: 0.7;
        transform: scale(0.98);
      }
      /* Consistent focus styles for accessibility */
      button:focus-visible,
      a:focus-visible,
      input:focus-visible,
      select:focus-visible {
        outline: 2px solid #0D9488;
        outline-offset: 2px;
      }
      /* Dynamic color support for iOS 18+ dark mode */
      @media (prefers-color-scheme: dark) {
        body {
          background-color: #000000;
          color: #FFFFFF;
        }
        .glass-panel {
          background: rgba(0, 0, 0, 0.80);
          border: 1px solid rgba(255, 255, 255, 0.15);
        }
      }
      /* Line clamp utility */
      .line-clamp-2 {
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      /* Animate-in utilities */
      .animate-in {
        animation-duration: 0.3s;
        animation-timing-function: ease-out;
        animation-fill-mode: both;
      }
      .fade-in {
        animation-name: fadeIn;
      }
      .slide-in-from-bottom-2 {
        animation-name: slideInFromBottom;
      }
      .slide-in-from-bottom-10 {
        animation-name: slideInFromBottomLarge;
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes slideInFromBottom {
        from { transform: translateY(8px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
      @keyframes slideInFromBottomLarge {
        from { transform: translateY(40px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
